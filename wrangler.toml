name = "reallylol-cms"
main = "cms/src/index.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "cms/public"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
SITE_URL = "https://really.lol"
MEDIA_URL = "https://media.really.lol"

[[d1_databases]]
binding = "DB"
database_name = "reallylol"
database_id = "b0ec5d41-a6d8-46d9-ae1b-4f537f7ad7fb"
migrations_dir = "cms/src/db/migrations"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "media-really-lol"
