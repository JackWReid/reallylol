      - generic [ref=e92]:
        - blockquote [ref=e93]:
          - paragraph [ref=e94]: The right, of course, has never had a monopoly on catastrophist fever dreams. The idea of a cleansing armageddon that instantly erases all the awkward parts of modernity, all the weary years of work and compromise between where we are and where we’d like to be, is universal, and universally childish. I’ve spent far too much time listening to drunk hipsters with retro-Soviet facial hair tell me there’s no point in feminism or anti-racism, because all of that will be fixed after the giant, bloody workers’ revolution that is absolutely on the way, so really it doesn’t matter how we treat each other in the present. You can hear the same gleeful anticipation in the rhetoric of “dark-green” eco-fundamentalist groups, which right now are outpacing religious extremists in their rush to claim the coronavirus as nature’s revenge on humanity. If you are really so keen to be punished, there are websites for that. If you find yourself eager to see the whole species punished, that’s not a fetish, that’s fascism.
        - paragraph [ref=e95]:
          - text: —
          - link "This is not the apocalypse you were looking for" [ref=e96] [cursor=pointer]:
            - /url: https://www.wired.com/story/coronavirus-apocalypse-myths/
          - text: ", Laurie Penny in"
          - emphasis [ref=e97]: WIRED
    - article [ref=e98]:
      - heading "Local power and the social order" [level=3] [ref=e99]:
        - link "Local power and the social order" [ref=e100] [cursor=pointer]:
          - /url: http://localhost:1314/highlight/american-gentry/
      - paragraph [ref=e101]:
        - img [ref=e102]
        - text: 30 December 2020
      - generic [ref=e114]:
        - blockquote [ref=e115]:
          - paragraph [ref=e116]: "But very few of my classmates really belonged to the area’s elite. It wasn’t a city of international oligarchs, but one dominated by its wealthy, largely agricultural property-owning class. They mostly owned, and still own, fruit companies: apples, cherries, peaches, and now hops and wine-grapes. The other large-scale industries in the region, particularly commercial construction, revolve at a fundamental level around agriculture: They pave the roads on which fruits and vegetables are transported to transshipment points, build the warehouses where the produce is stored, and so on."
          - paragraph [ref=e117]: …
          - paragraph [ref=e118]: "Gentry classes are a common feature of a great many social-economic-political regimes throughout history. Pretty much anywhere you have a hierarchical form of social organization and property ownership, a gentry class of some kind emerges: the local civic elites of the Roman Empire, the landlords of later Han China, the numerous lower nobility of late medieval France, the thegns of Anglo-Saxon England, the Prussian Junkers, or the planter class of the antebellum South. The gentry are generally distinct from the highest levels of a regime’s political and economic elite: They’re usually not resident in the political center, they don’t hold major positions in the central administration of the state (whatever that might consist of) and aren’t counted among the wealthiest people in their polity. New national or imperial elites might emerge over time from a gentry class, even rulers - the boundaries between these groups can be more or less porous - but that’s not usually the case."
        - paragraph [ref=e119]:
          - text: —
          - link "American Genry" [ref=e120] [cursor=pointer]:
            - /url: https://patrickwyman.substack.com/p/american-gentry
          - text: ", Patrick Wyman in"
          - emphasis [ref=e121]: "Perspectives: Past, Present, and Future"
