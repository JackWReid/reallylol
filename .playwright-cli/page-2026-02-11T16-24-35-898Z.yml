      - generic [ref=e181]:
        - blockquote [ref=e182]:
          - paragraph [ref=e183]: But the real gem of the library, in Lannon’s view, is the stuff that you can find only in boxes like the ones now strewn across the table. “You can get a book anywhere,” he said. “An archive exists in one location.” The room we’re standing in is the only place that you can read, say, the week’s worth of journal entries in which New York Times editor Abe Rosenthal contemplates publishing the Pentagon Papers. It’s the only place where you can read the collected papers of Robert Moses, or a letter T.S. Eliot wrote about Ulysses to James Joyce’s Paris publisher, Sylvia Beach.
          - paragraph [ref=e184]: "These collections aren’t digitized. The only way to find out what’s inside them is to ask for a particular box — often with just a vague notion of what will be in it — and to hold the old papers in your hands. “I don’t know how one could be interested in libraries and not archives,” Lannon told me. They tell you “the stories behind things,” he said, “the unpublished, the hard to find, the true story.” This, I began to see, is why someone might have been inclined to call Lannon the most interesting man in the world: it’s because he knows so many of these stories himself, including stories that no one else knows, because they are only told here."
          - paragraph [ref=e185]: That is the paradox of being an archivist. The reason an archivist should know something, Lannon said, is to help others to know it. But it’s not really the archivist’s place to impose his knowledge on anyone else. Indeed, if the field could be said to have a creed, it’s that archivists aren’t there to tell you what’s important. Historically momentous documents are to be left in folders next to the trivial and the mundane — because who’s to say what’s actually mundane or not?
        - paragraph [ref=e186]:
          - text: —
          - link "Keepers of the Secrets" [ref=e187] [cursor=pointer]:
            - /url: https://www.villagevoice.com/2017/09/20/keepers-of-the-secrets/
          - text: ", James Somers in"
          - emphasis [ref=e188]: The Village Voice
    - article [ref=e189]:
      - heading "The demographics of early UNIX users" [level=3] [ref=e190]:
        - link "The demographics of early UNIX users" [ref=e191] [cursor=pointer]:
          - /url: http://localhost:1314/highlight/unix-literature/
      - paragraph [ref=e192]:
        - img [ref=e193]
        - text: 12 November 2020
      - generic [ref=e205]:
        - blockquote [ref=e206]:
          - paragraph [ref=e207]: But the most recurrent complaint was that it was too text-oriented. People really hated the command line, with all the utilities, obscure flags, and arguments they had to memorize. They hated all the typing. One mislaid character and you had to start over. Interestingly, this complaint came most often from users of the GUI-laden Macintosh or Windows platforms. People who had slaved away on DOS batch scripts or spent their days on character-based terminals of multiuser non-UNIX machines were less likely to express the same grievance.
          - paragraph [ref=e208]: "Though I understood how people might be put off by having to remember such willfully obscure utility names like cat and grep, I continued to be puzzled at why they resented typing. Then I realized I could connect the complaint with the scores of “intellectual elite” (as my manager described them) in UNIX shops. The common thread was wordsmithing; a suspiciously high proportion of my UNIX colleagues had already developed, in some prior career, a comfort and fluency with text and printed words. They were adept readers and writers, and UNIX played handily to those strengths. UNIX was, in some sense, literature to them. Suddenly the overrepresentation of polyglots, liberal-arts types, and voracious readers in the UNIX community didn’t seem so mysterious, and pointed the way to a deeper issue: in a world increasingly dominated by image culture (TV, movies, .jpg files), UNIX remains rooted in the culture of the word."
        - paragraph [ref=e209]:
          - text: —
          - 'link "The Elements of Style: UNIX as Literature" [ref=e210] [cursor=pointer]':
            - /url: http://theody.net/elements.html
          - text: ", Thomas Scoville"
