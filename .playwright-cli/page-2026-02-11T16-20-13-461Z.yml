            - 'link "Festooned: Martin Gerlach’s Decorative Groupings (1897)" [ref=e64] [cursor=pointer]':
              - /url: https://publicdomainreview.org/collection/martin-gerlach-festons
          - paragraph [ref=e65]:
            - text: A prolific engraver and photographer, Martin Gerlach (1846–1918) made his name by founding an eponymous publishing company in Berlin. After relocating to Vienna, he launched a series of children’s books,
            - emphasis [ref=e66]: Jugendbücherei
            - text: ", which featured illustrations by Carl Otto Czeschka, Gustav Klimt, Franz Wacik, and other artists, many in vogue or soon to be. Eventually starting the Polygraphic Art Institute with Ferdinand Shenk, Gerlach passed on his business and artistic legacy to his son, also named Martin Gerlach (1879–1944), who adopted a surrealist approach to photography. Below you will find a set of images from one of the lesser-known works by Gerlach (senior),"
            - emphasis [ref=e67]: Festons und Decorative Gruppen aus Pflanzen und Thieren
            - text: (Festoons and Decorative Groups of Plants and Animals), originally published in 1893. It is a quintessential…
