        - paragraph [ref=e96]: The words aren’t coming and usually that’s my fault. I wad up my sense holes with dopamine doped fluff and the ooze of it bungs up my brain. I lose the element of surprise so I can’t write anything interesting at all. The writing I have done in the last week or so has been the drip drip of mucus out from the congested sinus and onto the page. Scenes I’ve poked at move glacially slowly through their outlines without interest.
