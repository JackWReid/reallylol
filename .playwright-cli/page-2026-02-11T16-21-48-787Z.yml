        - paragraph [ref=e181]: We wanted to go see something; it was our first opportunity since we’ve been back in the city where cinemas are unlimited to us and where we’ve been like churchgoers there since the first winter we arrived. The pavements have been glazed with ice two, three times over, so we didn’d walk like we usually would. We took the bus and got off at Hermannplatz, walked up the sharpish hill to Neues Off. It’s always packed in the tiny little atrium there with small groups of friends chatting on the pavement outside, even in the freezing cold. Once we pushed our way through to have our tickets checked, it transpired I’d brought us to the wrong cinema and that we should be at Passage Kino on Karl-Marx-Allee. It is not the first time I’ve made this kind of mistake. We took the U-Bahn down there and still sat down before the movie started, comfortably.
