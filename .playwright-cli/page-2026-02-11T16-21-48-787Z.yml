        - paragraph [ref=e124]: For a week Berlin’s been covered in ice. It’s an inch thick on the roads and the bike lanes and the pavements, and it’s been there so long it’s black and mottled and hard like a mineral deposit. They don’t grit or salt here. There’s a dispute about who should do the gritting and the salting, between the city and the Ordnungsamt and the street cleaners they contract. Verdicts differ by jurisdiction so some neighbourhoods are slippier than others. Halfway along a bridge over the Spree there’s a border between two districts and sure enough there’s a crisp line where the sheet ice stops and the gritted slurry starts.
