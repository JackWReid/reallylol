        - paragraph [ref=e62]:
          - emphasis [ref=e63]:
            - strong [ref=e64]: "Spoiler warning:"
            - text: I spoil the plot of this 1950s pulp fiction novel early, often, and remorselessly.
        - paragraph [ref=e65]:
          - text: I picked
          - emphasis [ref=e66]: The Silver Eggheads
          - text: "off a shelf of battered paperback pulp fiction in the Glasgow branch of Oxfam Books. Like all good pulp fiction, the illustration on its cover is absurd and confusing. A flesh-coloured humanoid with simple socket holes for eyes and a mouth, two-pronged grabbers for hands, ball-joints for knees and elbows, and hemispherical breasts covered with the solitary piece of clothing: a white bra. Just next to that creature, a seemingly human man in a mid-century sort of lounge outfit and a sailors’s hat reaches across a metallic console of dials and gauges as if to grab the flesh bot. In the extreme foreground of the image, looming in from the left hand side of the frame, a glass balloon with suggestions of facial features that are once again socket holes skitters across the floor with thin metallic appendages that end in unheimlich four-fingered hands."
