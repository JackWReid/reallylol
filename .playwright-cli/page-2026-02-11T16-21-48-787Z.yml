        - paragraph [ref=e323]: Watched as part of a triple-kino weekend in dark, freezing Berlin. This one at Rollberg. Maybe that contributed to our dislike; we always resent walking past Passage and having to climb the hill to the ugly shopping centre.
        - paragraph [ref=e324]: We both hated the ending. It was visually poorly executed and seemed like a reshoot, sound stagey, VFXey mess. It was also not really earned. Why is she tearing pages out of her notebook? She was never writing! Was it real or a fantasy or a delusion? Who cares.
